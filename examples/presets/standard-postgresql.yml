---
# Conventional full-stack Rails preset with PostgreSQL, Tailwind, and Importmap.
#
# Use directly:
#   railstart new my_app --preset ./examples/presets/standard-postgresql.yml --default
#
# Or copy to:
#   ~/.config/railstart/presets/standard-postgresql.yml

questions:
  - id: database
    choices:
      - name: PostgreSQL
        value: postgresql
        default: true

  - id: css
    choices:
      - name: Tailwind
        value: tailwind
        default: true

  - id: javascript
    choices:
      - name: Importmap
        value: importmap
        default: true
        rails_flag: "--javascript=importmap"

  - id: skip_features
    default: []

  - id: api_only
    default: false

  - id: skip_docker
    default: false

  - id: skip_bundle
    default: false

post_actions:
  - id: init_git
    enabled: true

  - id: bundle_install
    enabled: false
