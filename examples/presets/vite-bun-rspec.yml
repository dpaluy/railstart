---
# Rails preset for a Vite frontend, Tailwind, PostgreSQL, Bun packaged through
# Bundlebun, and RSpec.
#
# Use directly:
#   railstart new my_app --preset ./examples/presets/vite-bun-rspec.yml --default
#
# Or copy to:
#   ~/.config/railstart/presets/vite-bun-rspec.yml

questions:
  - id: database
    choices:
      - name: PostgreSQL
        value: postgresql
        default: true

  - id: css
    choices:
      - name: Tailwind
        value: tailwind
        default: true

  - id: javascript
    choices:
      - name: Vite
        value: vite
        default: true

  - id: skip_features
    default: []

  - id: test_framework
    choices:
      - name: RSpec
        value: rspec
        default: true
        rails_flag: "--skip-test"

  - id: skip_docker
    default: false

  - id: skip_bundle
    default: false

post_actions:
  - id: setup_vite
    name: "Setup Vite Rails"
    enabled: true
    command: "bundle add vite_rails && bundle install && bundle exec vite install"

  - id: setup_bundlebun
    name: "Setup Bundlebun"
    enabled: true
    command: "bundle add bundlebun && bundle install && bundle exec rake bun:install"

  - id: setup_rspec
    enabled: true

  - id: bundle_install
    enabled: false
