---
# JSON API preset for PostgreSQL-backed services.
#
# Use directly:
#   railstart new my_api --preset ./examples/presets/api-postgresql.yml --default
#
# Or copy to:
#   ~/.config/railstart/presets/api-postgresql.yml

questions:
  - id: database
    choices:
      - name: PostgreSQL
        value: postgresql
        default: true

  - id: css
    choices:
      - name: None
        value: none
        default: true

  - id: javascript
    choices:
      - name: None
        value: none
        default: true
        rails_flag: "--skip-javascript"

  - id: skip_features
    default:
      - action_mailer
      - action_mailbox
      - action_text
      - active_storage
      - action_cable
      - hotwire

  - id: api_only
    default: true

  - id: skip_docker
    default: false

post_actions:
  - id: init_git
    enabled: true

  - id: bundle_install
    enabled: false
